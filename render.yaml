services:
  - type: web
    name: vicky-portfolio-agent
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false        # Set this manually in Render dashboard
      - key: GITHUB_TOKEN
        sync: false        # Set this manually in Render dashboard
    autoDeploy: true

