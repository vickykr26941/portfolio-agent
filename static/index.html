<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vicky Kumar — Portfolio Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #090c10;
    --surface:  #0d1117;
    --border:   #1e2937;
    --border2:  #253347;
    --accent:   #00e5ff;
    --accent2:  #7c3aed;
    --green:    #00ff88;
    --text:     #e2eaf4;
    --muted:    #8b9ab0;
    --bubble-u: #0f1f33;
    --bubble-a: #111827;
    --chip-bg:  #0d1f35;
    --glow:     rgba(0,229,255,0.15);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    display: flex;
    flex-direction: column;
    height: 100dvh;
    position: relative;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glow orb */
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    right: -100px;
    width: 600px;
    height: 600px;
    background: radial-gradient(circle, rgba(124,58,237,0.12) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: rgba(13,17,23,0.9);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .avatar {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 16px;
    color: #fff;
    flex-shrink: 0;
    position: relative;
  }

  .avatar::after {
    content: '';
    position: absolute;
    bottom: -2px;
    right: -2px;
    width: 10px;
    height: 10px;
    background: var(--green);
    border-radius: 50%;
    border: 2px solid var(--bg);
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.2); }
  }

  .header-info h1 {
    font-family: 'Syne', sans-serif;
    font-size: 16px;
    font-weight: 800;
    color: var(--text);
    letter-spacing: -0.3px;
  }

  .header-info p {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-top: 1px;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .contact-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border2);
    background: var(--chip-bg);
    color: var(--text);
    text-decoration: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    transition: all 0.2s;
    cursor: pointer;
  }

  .contact-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.06);
    box-shadow: 0 0 12px rgba(0,229,255,0.15);
  }

  .contact-btn svg { width: 14px; height: 14px; fill: currentColor; }

  /* ── CHAT AREA ── */
  .chat-wrapper {
    flex: 1;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    position: relative;
    z-index: 1;
  }

  #messages {
    flex: 1;
    overflow-y: auto;
    padding: 24px 20px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }

  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-track { background: transparent; }
  #messages::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 4px; }

  /* ── WELCOME CARD ── */
  .welcome-card {
    background: linear-gradient(135deg, rgba(13,31,51,0.8), rgba(17,24,39,0.8));
    border: 1px solid var(--border2);
    border-radius: 16px;
    padding: 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.5s ease both;
  }

  .welcome-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
  }

  .welcome-card .badge {
    display: inline-block;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.2);
    color: var(--accent);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 12px;
    border-radius: 100px;
    margin-bottom: 16px;
  }

  .welcome-card h2 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 4vw, 32px);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #fff 40%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .welcome-card p {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto 20px;
  }

  .welcome-card p span {
    color: var(--green);
    font-weight: 500;
  }

  /* Quick chips in welcome */
  .chips-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 8px;
    max-width: 440px;
    margin: 0 auto;
  }

  @media (max-width: 400px) {
    .chips-grid { grid-template-columns: 1fr; }
  }

  .chip {
    padding: 10px 14px;
    background: var(--chip-bg);
    border: 1px solid var(--border2);
    border-radius: 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.07);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(0,229,255,0.1);
  }

  .chip-icon { font-size: 14px; }

  /* ── MESSAGES ── */
  .msg {
    display: flex;
    gap: 10px;
    max-width: 800px;
    animation: fadeUp 0.3s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .msg.user { align-self: flex-end; flex-direction: row-reverse; }
  .msg.assistant { align-self: flex-start; }

  .msg-avatar {
    width: 30px;
    height: 30px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    flex-shrink: 0;
    margin-top: 2px;
  }

  .msg.user .msg-avatar {
    background: linear-gradient(135deg, #1e3a5f, #2563eb);
    color: #fff;
  }

  .msg.assistant .msg-avatar {
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 10px;
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 12px;
    font-size: 13px;
    line-height: 1.7;
    max-width: calc(100% - 50px);
    border: 1px solid var(--border);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.user .msg-bubble {
    background: var(--bubble-u);
    border-color: var(--border2);
    border-bottom-right-radius: 4px;
    color: var(--text);
  }

  .msg.assistant .msg-bubble {
    background: var(--bubble-a);
    border-color: var(--border);
    border-bottom-left-radius: 4px;
    color: var(--text);
  }

  .msg-bubble a {
    color: var(--accent);
    text-decoration: none;
    border-bottom: 1px solid rgba(0,229,255,0.3);
  }
  .msg-bubble a:hover { border-color: var(--accent); }

  /* ── TYPING INDICATOR ── */
  .typing-indicator {
    display: flex;
    gap: 10px;
    align-self: flex-start;
    animation: fadeUp 0.3s ease both;
  }

  .typing-dots {
    padding: 14px 18px;
    background: var(--bubble-a);
    border: 1px solid var(--border);
    border-radius: 12px;
    border-bottom-left-radius: 4px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .typing-dots span {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
    animation: typingBounce 1.2s infinite;
  }
  .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
  .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

  @keyframes typingBounce {
    0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
    30% { opacity: 1; transform: translateY(-4px); }
  }

  /* ── SUGGESTED CHIPS (below messages) ── */
  .suggestions {
    padding: 8px 20px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: rgba(9,12,16,0.7);
    backdrop-filter: blur(8px);
  }

  .sugg-chip {
    padding: 6px 12px;
    background: var(--chip-bg);
    border: 1px solid var(--border2);
    border-radius: 100px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .sugg-chip:hover {
    border-color: var(--accent);
    color: var(--accent);
    background: rgba(0,229,255,0.07);
  }

  /* ── INPUT AREA ── */
  .input-area {
    padding: 14px 20px;
    background: rgba(13,17,23,0.95);
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
    backdrop-filter: blur(12px);
  }

  .input-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 12px;
    padding: 10px 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .input-row:focus-within {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  #input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    resize: none;
    max-height: 120px;
    line-height: 1.6;
  }

  #input::placeholder { color: var(--muted); }

  
  #send-btn {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
  }

  #send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(0,229,255,0.3); }
  #send-btn:active { transform: scale(0.97); }
  #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  #send-btn svg { width: 16px; height: 16px; fill: #fff; }

  .input-hint {
    text-align: center;
    font-size: 10px;
    color: #3d4f63;
    margin-top: 8px;
    letter-spacing: 0.5px;
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    header { padding: 12px 16px; }
    .contact-btn span { display: none; }
    #messages { padding: 16px 12px 8px; }
    .suggestions { padding: 6px 12px; }
    .input-area { padding: 10px 12px; }
    .welcome-card { padding: 20px 16px; }
  }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="header-left">
    <div class="avatar">VK</div>
    <div class="header-info">
      <h1>Vicky Kumar</h1>
      <p>⚡ Portfolio Agent</p>
    </div>
  </div>
  <div class="header-right">
    <a href="mailto:vickykr26941@gmail.com" class="contact-btn" title="Email">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/></svg>
      <span>Email</span>
    </a>
    <a href="https://linkedin.com/in/vickykumar" target="_blank" class="contact-btn" title="LinkedIn">
      <svg viewBox="0 0 24 24"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>
      <span>LinkedIn</span>

    <a href="https://github.com/vickykumar26941" target="_blank" class="contact-btn" title="GitHub">
      <svg viewBox="0 0 24 24"><path d="M12 0C5.374 0 0 5.373 0 12c0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23A11.509 11.509 0 0112 5.803c1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576C20.566 21.797 24 17.3 24 12c0-6.627-5.373-12-12-12z"/></svg>
      <span>GitHub</span>
    </a>
  </div>
</header>

<!-- CHAT -->
<div class="chat-wrapper">
  <div id="messages">
    <!-- Welcome card injected by JS -->
  </div>

  <!-- Suggested quick questions -->
  <div class="suggestions" id="suggestions">
    <span class="sugg-chip" onclick="sendChip('Tell me about your current role at Eka.Care')">💼 Eka.Care Role</span>
    <span class="sugg-chip" onclick="sendChip('What is your complete tech stack and skills?')">🛠️ Tech Stack</span>
    <span class="sugg-chip" onclick="sendChip('Show me all your projects')">🚀 Projects</span>
    <span class="sugg-chip" onclick="sendChip('What are your competitive programming achievements?')">🏆 Achievements</span>
    <span class="sugg-chip" onclick="sendChip('Tell me about your work experience')">� Experience</span>
    <span class="sugg-chip" onclick="sendChip('How can I contact you?')">📬 Contact</span>
  </div>
</div>

<!-- INPUT -->
<div class="input-area">
  <div class="input-row">
    <textarea id="input" rows="1" placeholder="Ask me anything about Vicky..." maxlength="500"></textarea>
    <button id="send-btn" onclick="sendMessage()" title="Send">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
  <p class="input-hint">Powered by Groq LLaMA 3.3 · Ask about experience, skills, projects, achievements, or anything else about Vicky</p>
</div>

<script>
const messagesEl = document.getElementById('messages');
const inputEl    = document.getElementById('input');
const sendBtn    = document.getElementById('send-btn');

let history = [];
let isLoading = false;

// ── Welcome card ──────────────────────────────────────────────────────────────
function renderWelcome() {
  const card = document.createElement('div');
  card.className = 'welcome-card';
  card.id = 'welcome-card';
  card.innerHTML = `
    <div class="badge">AI Portfolio Agent</div>
    <h2>Hey, I'm VickyBot 👋</h2>
    <p>
      I'm an AI agent that knows <span>everything</span> about Vicky Kumar —
      backend dev, Go/Python/Java enthusiast, LLM tinkerer, and competitive programmer.
      Ask me anything. I don't sugarcoat, I give you the real data.
    </p>
    <div class="chips-grid">
      <button class="chip" onclick="sendChip('Tell me about Vicky\\'s work experience')">
        <span class="chip-icon">💼</span> Work Experience
      </button>
      <button class="chip" onclick="sendChip('What is Vicky\\'s tech stack and skills?')">
        <span class="chip-icon">🛠️</span> Skills & Stack
      </button>
      <button class="chip" onclick="sendChip('Show me Vicky\\'s projects')">
        <span class="chip-icon">🚀</span> Projects
      </button>
      <button class="chip" onclick="sendChip('How can I contact Vicky?')">
        <span class="chip-icon">📬</span> Contact Info
      </button>
    </div>
  `;
  messagesEl.appendChild(card);
}

// ── Message rendering ─────────────────────────────────────────────────────────
function addMessage(role, text) {
  // Remove welcome card on first user message
  if (role === 'user') {
    const wc = document.getElementById('welcome-card');
    if (wc) wc.style.display = 'none';
  }

  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'user' ? '👤' : 'VK';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatText(text);

  wrap.appendChild(av);
  wrap.appendChild(bubble);
  messagesEl.appendChild(wrap);
  scrollToBottom();
  return bubble;
}

function formatText(text) {
  // Convert markdown-like formatting and URLs to HTML
  return text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/`([^`]+)`/g, '<code style="background:rgba(0,229,255,0.08);padding:1px 6px;border-radius:4px;font-size:12px;color:#00e5ff">$1</code>')
    .replace(/(https?:\/\/[^\s<]+)/g, '<a href="$1" target="_blank" rel="noopener">$1</a>')
    .replace(/\n/g, '<br>');
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'typing-indicator';
  wrap.id = 'typing';

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.style.cssText = 'width:30px;height:30px;border-radius:8px;background:linear-gradient(135deg,#7c3aed,#00e5ff);display:flex;align-items:center;justify-content:center;font-family:Syne,sans-serif;font-weight:800;font-size:10px;color:#fff;flex-shrink:0;margin-top:2px';
  av.textContent = 'VK';

  const dots = document.createElement('div');
  dots.className = 'typing-dots';
  dots.innerHTML = '<span></span><span></span><span></span>';

  wrap.appendChild(av);
  wrap.appendChild(dots);
  messagesEl.appendChild(wrap);
  scrollToBottom();
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── Send logic ────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text || isLoading) return;

  isLoading = true;
  sendBtn.disabled = true;
  inputEl.value = '';
  inputEl.style.height = 'auto';

  addMessage('user', text);
  history.push({ role: 'user', content: text });
  showTyping();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text, history: history.slice(-10) })
    });

    removeTyping();

    if (!res.ok) {
      const err = await res.json().catch(() => ({ detail: 'Unknown error' }));
      addMessage('assistant', `⚠️ Error: ${err.detail || 'Something went wrong. Please try again.'}`);
    } else {
      const data = await res.json();
      addMessage('assistant', data.reply);
      history.push({ role: 'assistant', content: data.reply });
    }
  } catch (e) {
    removeTyping();
    addMessage('assistant', '⚠️ Network error. Make sure the server is running and try again.');
  }

  isLoading = false;
  sendBtn.disabled = false;
  inputEl.focus();
}

function sendChip(text) {
  inputEl.value = text;
  sendMessage();
}

// ── Input auto-resize + enter key ────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
});

inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderWelcome();
inputEl.focus();
</script>
</body>
</html>
